const DATA = {

    '狂想靈':{hp:85,en:55,atk:19,def:10,acc:72,eva:20,ai:'drain',color:'#22d3ee',passive:'回合開始偷取少量 EN。'},

const UTIL = {
  clamp:(v,min,max)=>Math.min(Math.max(v,min),max),
  pick:(arr)=>arr[Math.floor(RNG.next()*arr.length)],
  shuffle:(arr)=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(RNG.next()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;},
  formatPercent:(v)=>Math.round(v*100)+'%'
};
const RNG = (()=>{
  let seed = Date.now() % 2147483647;
  function setSeed(s){ seed = s>>>0; }
  function next(){ seed = (seed * 1664525 + 1013904223) % 4294967296; return seed / 4294967296; }
  function getSeed(){ return seed>>>0; }
  return {setSeed,next,getSeed};
})();
const AudioFX = (()=>{
  let enabled=false,ctx=null;
  function ensure(){ if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)(); }
  function play(freq=440,duration=0.2,type='sine'){
    if(!enabled) return;
    ensure();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type=type; osc.frequency.value=freq;
    gain.gain.value=0.0001;
    osc.connect(gain); gain.connect(ctx.destination);
    const now = ctx.currentTime;
    gain.gain.exponentialRampToValueAtTime(0.08, now+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+duration);
    osc.start();
    osc.stop(now+duration+0.02);
  }
  return {
    toggle(v){ enabled=v; if(enabled) ensure(); if(enabled) play(660,0.15,'triangle'); },
    noteHit(){ play(540,0.18,'triangle'); },
    noteMiss(){ play(220,0.18,'sawtooth'); },
    noteBuff(){ play(760,0.2,'sine'); },
    victory(){ play(880,0.4,'square'); }
  };
})();
const Inventory = (()=>{

})();
const Entity = (()=>{

const BattleSystem = (()=>{
  const states = {idle:'idle',player:'player',enemy:'enemy',victory:'victory',defeat:'defeat'};
  let battle=null;
  function create(hero,enemy){
    battle = {
      hero:structuredClone(hero),
      enemy:enemy,
      turn:1,
      state:states.player,
      log:[],
      heroBuff:{crit:0,nextSure:false,shield:0,stone:false},
      guard:false,
      tempoShift:0,
      bossPhase:1,
      stats:{selfRecoil:0}
    };
    Entity.resetCombatant(battle.hero);
    Entity.resetCombatant(battle.enemy);
    if(hero.traits.shieldStart) battle.heroBuff.shield=1;
    if(hero.traits.firstSureHit) battle.heroBuff.nextSure=true;
    if(hero.traits.hero==='ke') battle.hero.effects.firstTurnAim=true;
    if(hero.traits.hero==='li') battle.heroBuff.shield = Math.max(battle.heroBuff.shield,1);
    UI.updateLog([]);

  function statusLabel(name,value){
    const map={失調:'命中↓',殘響灼:'持續傷',遲拍:'延遲',過音:'反噬'};
    return `${name}${value.turns?`(${value.turns})`:''}·${map[name]||''}`;
  }
  function calcHit(attacker,defender,temp){
    let acc = attacker.acc + (attacker.effects?.acc||0) + (temp?.acc||0);
    if(attacker.status['失調']) acc -= 18;
    if(defender.status['遲拍']) acc += 12;
    acc = Math.max(acc,10);
    const eva = Math.max(defender.eva + (defender.effects?.eva||0),1);
    let chance = acc/(acc+eva);
    chance = UTIL.clamp(chance,0.2,0.95);
    if(temp?.sure) chance=1;
    if(attacker.effects?.firstTurnAim){ chance = Math.min(0.98,chance+0.12); attacker.effects.firstTurnAim=false; }
    const roll = RNG.next();
    return {hit:roll<chance, chance};
  }
  function calcDamage(attacker,defender,crit){
    const variation = 0.85 + RNG.next()*0.3;
    let dmg = attacker.atk * variation - defender.def;
    dmg = Math.max(1,Math.round(dmg));
    if(crit){ dmg = Math.round(dmg * (CONFIG.critMult + (attacker.traits?.critBonus||0))); }
    return dmg;
  }
  function pushLog(msg){
    battle.log.push(`[${battle.turn}] ${msg}`);
    if(battle.log.length>CONFIG.logLimit) battle.log.shift();
    UI.updateLog(battle.log);
  }
  function applyStatus(target,name,turns){
    if(!target.status[name]) target.status[name]={turns};
    else target.status[name].turns=Math.max(target.status[name].turns,turns);
  }
  function removeStatus(target,name){ delete target.status[name]; }
  function spendEN(user,cost){
    user.en = Math.max(0,user.en - cost);
  }
  function doHeroAction(action){
    if(!battle||battle.state!==states.player) return;
    const hero = battle.hero; const enemy = battle.enemy;
    const mapActions = {
      attack:()=>{
        if(hero.en<CONFIG.enCost.attack){ pushLog('能量不足，無法基音打擊'); return false; }
        spendEN(hero,CONFIG.enCost.attack);
        const hit = calcHit(hero,enemy,{sure:battle.heroBuff.nextSure,acc:battle.tempoShift});
        const critChance = CONFIG.baseCrit + (battle.heroBuff.crit||0);
        const crit = hit.hit && RNG.next()<critChance;
        if(!hit.hit){
          pushLog('你揮出樂弓，但音波散去。');
          AudioFX.noteMiss();
        } else {
          let dmg = calcDamage(hero,enemy,crit);
          if(battle.heroBuff.stone){ dmg += CONFIG.trueDamageStone; battle.heroBuff.stone=false; }
          enemy.hp = Math.max(0, enemy.hp - dmg);
          pushLog(`基音打擊造成 ${dmg}${crit?' (暴擊)':''} 傷害。`);
          AudioFX.noteHit();
          if(enemy.id==='回聲影' && RNG.next()<0.2){ applyStatus(hero,'失調',{turns:2}); pushLog('回聲影回施失調！'); }
          if(enemy.id==='低頻獸' && RNG.next()<0.2){ applyStatus(hero,'殘響灼',{turns:3}); pushLog('低頻獸低頻震顫造成殘響灼。'); }
        }
        battle.heroBuff.nextSure=false;
        endHeroTurn();
        return true;
      },
      tune:()=>{
        if(hero.en<CONFIG.enCost.tune){ pushLog('能量不足，無法調律'); return false; }
        spendEN(hero,CONFIG.enCost.tune);
        hero.effects.acc = (hero.effects.acc||0)+15;
        if(hero.status['失調'] && RNG.next()<0.5){ removeStatus(hero,'失調'); pushLog('疊拍成功，失調清除！'); }
        else pushLog('你調整節拍，命中率提升。');
        AudioFX.noteBuff();
        endHeroTurn();
        return true;
      },
      shield:()=>{
        if(hero.en<CONFIG.enCost.shield){ pushLog('能量不足，無法護壁'); return false; }
        spendEN(hero,CONFIG.enCost.shield);
        battle.guard = true;
        hero.en = Math.min(hero.enMax, hero.en + CONFIG.enRegenShield);
        pushLog('節奏護壁減少下一次傷害，並回復能量。');
        AudioFX.noteBuff();
        endHeroTurn();
        return true;
      },
      harmony:()=>{
        if(hero.en<CONFIG.enCost.harmony){ pushLog('能量不足，無法擴散'); return false; }
        spendEN(hero,CONFIG.enCost.harmony);
        battle.heroBuff.crit = CONFIG.harmonyCrit;
        if(RNG.next()<CONFIG.dissonanceChance){ applyStatus(enemy,'失調',{turns:2}); pushLog('和聲擴散使敵方失調！'); }
        else pushLog('和聲擴散強化了暴擊機率。');
        AudioFX.noteBuff();
        endHeroTurn();
        return true;
      },
      ultimate:()=>{
        if(hero.cooldowns.ult>0){ pushLog('必殺尚在冷卻。'); return false; }
        if(hero.traits.hero==='li'){
          hero.cooldowns.ult=3;
          hero.en = Math.min(hero.enMax, hero.en + 18);
          ['失調','殘響灼','遲拍','過音'].forEach(s=>removeStatus(hero,s));
          pushLog('溫柔分解洗去負面，能量舒緩湧現。');
        } else {
          hero.cooldowns.ult=3;
          battle.heroBuff.nextSure=true;
          battle.heroBuff.crit = 1;
          pushLog('脈衝強擊蓄勢，下回合必中且暴擊！');
        }
        AudioFX.noteBuff();
        endHeroTurn();
        return true;
      },
      item:()=>{
        UI.openInventoryModal();
        return false;
      }
    };
    const acted = mapActions[action]();
    if(action!=='item' && acted) UI.updateHero(hero,battle.heroBuff);
  }
  function endHeroTurn(){
    const hero = battle.hero;
    const enemy = battle.enemy;
    hero.cooldowns.ult = Math.max(0, hero.cooldowns.ult-1);
    if(hero.traits.enRegen) hero.en = Math.min(hero.enMax, hero.en + hero.traits.enRegen);
    battle.state = states.enemy;
    tickStatus(hero);
    UI.updateHero(hero,battle.heroBuff);
    setTimeout(enemyTurn,CONFIG.animationMs);
  }
  function tickStatus(target){
    Object.keys(target.status).forEach(key=>{
      const obj = target.status[key];
      if(obj.turns!==undefined){ obj.turns-=1; if(obj.turns<=0) delete target.status[key]; }
    });
  }
  function enemyTurn(){
    if(!battle) return;
    const hero = battle.hero;
    const enemy = battle.enemy;
    if(enemy.hp<=0){ win(); return; }
    if(hero.hp<=0){ lose(); return; }
    if(enemy.id==='狂想靈'){ const steal=8; hero.en=Math.max(0,hero.en-steal); enemy.en=Math.min(enemy.enMax,enemy.en+steal); pushLog('狂想靈竊取了你的能量。'); }
    if(enemy.id==='失調大師' && enemy.phase===1 && enemy.hp <= enemy.hpMax*CONFIG.bossPhaseTrigger){
      enemy.phase=2; pushLog('失調大師狂笑，殘響湧動！'); applyStatus(hero,'殘響灼',3); }
    let action='attack';
    if(enemy.ai==='fast' && RNG.next()<0.35) action='delay';
    if(enemy.ai==='echo' && RNG.next()<0.4) action='dissonance';
    if(enemy.ai==='low' && RNG.next()<0.3) action='burn';
    if(enemy.ai==='drain' && RNG.next()<0.5) action='over';
    if(enemy.ai==='boss'){
      if(enemy.phase===1){ action = RNG.next()<0.4?'dissonance':'attack'; }
      else action = RNG.next()<0.6?'resonanceWave':'dissonance';
    }
    enemyAction(action);
  }
  function applyStatus(target,name,turns){
    if(!target.status[name]) target.status[name]={turns};
    else target.status[name].turns=Math.max(target.status[name].turns,turns);
  }
  function enemyAction(type){
    const hero = battle.hero;
    const enemy = battle.enemy;
    const hit = () => calcHit(enemy,hero,{});
    if(type==='attack'){
      const result = hit();
      if(!result.hit){ pushLog(`${enemy.name} 的音浪落空。`); }
      else {
        let dmg = calcDamage(enemy,hero,false);
        if(battle.heroBuff.shield>0){
          const block=12;
          dmg=Math.max(0,dmg-block);
          battle.heroBuff.shield--;
          pushLog('和聲護盾吸收部分傷害。');
        }
        if(battle.guard){ dmg = Math.round(dmg*(1-CONFIG.shieldReduction)); battle.guard=false; }
        hero.hp = Math.max(0, hero.hp-dmg);
        pushLog(`${enemy.name} 造成 ${dmg} 傷害。`);
      }
    } else if(type==='delay'){
      applyStatus(hero,'遲拍',2);
      pushLog('拍落鳥拖慢了你的節拍。');
    } else if(type==='dissonance'){
      applyStatus(hero,'失調',3);
      pushLog(`${enemy.name} 施加失調。`);
    } else if(type==='burn'){
      applyStatus(hero,'殘響灼',3);
      pushLog('低頻獸的震動灼傷了你。');
    } else if(type==='over'){
      applyStatus(hero,'過音',2);
      pushLog('狂想靈讓你陷入過音反噬。');
    } else if(type==='resonanceWave'){
      const dmg = Math.max(6,Math.round(enemy.atk*0.8));
      hero.hp = Math.max(0, hero.hp-dmg);
      applyStatus(hero,'殘響灼',3);
      pushLog('失調大師釋放殘響波，造成 '+dmg+' 傷害並附帶灼燒！');
    }
    if(hero.status['殘響灼']){
      hero.hp = Math.max(0, hero.hp-6);
      pushLog('殘響灼灼燒造成 6 傷。');
    }
    if(hero.status['過音']){
      hero.hp = Math.max(0, hero.hp-4);
      battle.stats.selfRecoil +=1;
      pushLog('過音反噬造成 4 傷。');
    }
    tickStatus(enemy);
    tickStatus(hero);
    battle.turn++;
    battle.state = hero.hp>0?states.player:states.defeat;
    battle.guard=false;
    battle.heroBuff.crit = 0;
    UI.updateHero(hero,battle.heroBuff);
    UI.updateActions();
    if(hero.hp<=0){ lose(); return; }
    if(enemy.hp<=0){ win(); return; }
    pushLog('輪到你行動。');
  }
  function win(){
    battle.state=states.victory;
    pushLog('你贏了！');
    AudioFX.victory();
    Game.onBattleWin(battle);
  }
  function lose(){
    battle.state=states.defeat;
    pushLog('旅程在此中斷……');
    Game.onBattleLose();
  }
  function getBattle(){ return battle; }
  function forceEnd(){ battle=null; }
  return {create,doHeroAction,getBattle,forceEnd};
})();
const SceneMap = (()=>{
  const canvas = document.getElementById('mapCanvas');
  const ctx = canvas.getContext('2d');
  let pulse=0;
  function render(state){
    const {areaIndex,nodeIndex} = state;
    const area = DATA.areas[areaIndex];
    const nodes = area.nodes;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='rgba(2,6,23,0.6)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    const padding=40;
    const availableW = canvas.width - padding*2;
    const step = availableW / (nodes.length-1||1);
    ctx.strokeStyle='rgba(148,163,184,0.4)';
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(padding, canvas.height/2);
    for(let i=1;i<nodes.length;i++){
      ctx.lineTo(padding+step*i, canvas.height/2);
    }
    ctx.stroke();
    nodes.forEach((node,i)=>{
      const x = padding + step*i;
      const y = canvas.height/2;
      const r = 20;
      ctx.beginPath();
      ctx.fillStyle = i===nodeIndex ? area.color : 'rgba(148,163,184,0.35)';
      ctx.arc(x,y,r+(i===nodeIndex?4:0),0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='#0f172a';
      ctx.font='14px sans-serif';
      ctx.textAlign='center';
      ctx.fillText(nodeLabel(node.type),x,y+32);
    });
    const charY = canvas.height/2;
    const charX = padding + step*nodeIndex;
    const size = 16 + Math.sin(pulse)*2;
    ctx.fillStyle='#f8fafc';
    ctx.beginPath();
    ctx.arc(charX, charY - 36, size, 0, Math.PI*2);
    ctx.fill();
    pulse+=0.05;
  }
  function nodeLabel(type){
    switch(type){
      case 'battle':return '戰鬥';
      case 'rest':return '休整';
      case 'event':return '事件';
      case 'boss':return 'Boss';
      case 'start':return '起點';
      default:return '';
    }
  }
  return {render};
})();
const UI = (()=>{
  const heroName = document.getElementById('heroName');
  const hpValue = document.getElementById('hpValue');
  const enValue = document.getElementById('enValue');
  const atkValue = document.getElementById('atkValue');
  const defValue = document.getElementById('defValue');
  const accValue = document.getElementById('accValue');
  const evaValue = document.getElementById('evaValue');
  const hpBar = document.getElementById('hpBar');
  const enBar = document.getElementById('enBar');
  const statusTags = document.getElementById('statusTags');
  const logBox = document.getElementById('logBox');
  const inventoryEl = document.getElementById('inventory');
  const turnInfo = document.getElementById('turnInfo');
  const progressText = document.getElementById('progressText');
  const modal = document.getElementById('modal');
  const modalBox = document.getElementById('modalBox');
  const toast = document.getElementById('toast');
  function updateHero(hero,buffs){
    if(!hero) return;
    heroName.textContent = `${hero.name} — ${hero.passive}`;
    hpValue.textContent = `${hero.hp}/${hero.hpMax}`;
    enValue.textContent = `${hero.en}/${hero.enMax}`;

    enBar.style.width = UTIL.formatPercent(hero.en/hero.enMax);
    statusTags.innerHTML='';
    Object.entries(hero.status).forEach(([name,val])=>{
      const tag=document.createElement('span');
      let color='';
      if(name==='失調') color='var(--yellow)';
      else if(name==='殘響灼') color='var(--red)';
      else if(name==='遲拍') color='var(--purple)';
      else if(name==='過音') color='#f87171';
      tag.style.backgroundColor = color?color+'33':'rgba(148,163,184,0.2)';
      tag.textContent = `${name}${val.turns?`(${val.turns})`:''}`;
      statusTags.appendChild(tag);
    });
    if(buffs?.shield){ const tag=document.createElement('span'); tag.style.backgroundColor='rgba(59,130,246,0.3)'; tag.textContent=`護盾(${buffs.shield})`; statusTags.appendChild(tag); }
    if(buffs?.crit){ const tag=document.createElement('span'); tag.style.backgroundColor='rgba(56,189,248,0.25)'; tag.textContent='暴擊↑'; statusTags.appendChild(tag); }
    if(buffs?.nextSure){ const tag=document.createElement('span'); tag.style.backgroundColor='rgba(94,234,212,0.2)'; tag.textContent='必中'; statusTags.appendChild(tag); }
  }
  function updateLog(log){
    logBox.innerHTML='';
    log.slice(-CONFIG.logLimit).forEach(line=>{
      const div=document.createElement('div');
      div.textContent=line;
      logBox.appendChild(div);
    });
    logBox.scrollTop=logBox.scrollHeight;
  }
  function updateInventory(inv){
    inventoryEl.innerHTML='';
    if(inv.length===0){ const empty=document.createElement('div'); empty.className='slot empty'; empty.textContent='無道具'; inventoryEl.appendChild(empty); return; }
    inv.forEach((item,i)=>{
      const el=document.createElement('div');
      el.className='slot';
      el.textContent=`${item.id}`;
      el.title=CONFIG.baseItem[item.id]?.desc||'';

  function updateActions(){

    else turnInfo.textContent='-';

  function updateProgress(areaIndex,nodeIndex){

  function openModal(html,buttons){

    modalBox.innerHTML=html;
    const list=document.createElement('div');
    list.className='choice-list';
    buttons.forEach(btn=>{
      const el=document.createElement('button');

      list.appendChild(el);

    modalBox.appendChild(list);

  function openInventoryModal(){

    openModal('<h3>選擇道具</h3>',inv.map((item,idx)=>({label:`${item.id}`,onClick:()=>Game.useItem(idx,true)})).concat([{label:'取消',onClick:()=>{}}]));
  }
  function toastMsg(msg){
    toast.textContent=msg;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),1000);
  }
  return {updateHero,updateInventory,updateActions,updateLog,openInventoryModal,openModal,closeModal,updateProgress,toast:toastMsg};
})();
const Game = (()=>{
  const heroSelect = document.getElementById('hero-select');

    inventory:Inventory.create(),
    areaIndex:0,

      nodeIndex:state.nodeIndex,

      upgradesTaken:state.upgradesTaken,
      clearStats:state.clearStats,
      scene:state.scene,

      data.scene='map';

      const data = JSON.parse(raw);

        state.scene='init';

    const battle = BattleSystem.create(state.hero,enemy);
    UI.updateHero(battle.hero,battle.heroBuff);
    UI.updateLog([]);
    UI.updateActions();
  }
  function onBattleWin(battle){
    state.hero = battle.hero;
    state.hero.status = battle.hero.status;
    state.hero.effects = battle.hero.effects;
    state.hero.cooldowns = battle.hero.cooldowns;
    state.clearStats.selfRecoil += battle.stats.selfRecoil;
    state.scene='map';
    state.battles+=1;
    state.clearStats.wins+=1;
    state.currentEnemy=null;
    maybeDrop();
    advanceIfNeeded();
    if(isGameClear()) showEnding();
    else if(state.battles % CONFIG.upgradeInterval===0) presentUpgrade();
    UI.updateHero(state.hero,{});
    UI.updateActions();
    save();
  }
  function maybeDrop(){
    if(RNG.next()>CONFIG.dropChance) return;
    const item = UTIL.pick(CONFIG.itemDropPool);
    if(Inventory.add(state.inventory,item)) UI.toast(`獲得 ${item}`);
    else UI.toast('背包已滿，無法拾取');
    UI.updateInventory(state.inventory);
  }
  function presentUpgrade(){
    const choices = UTIL.shuffle(CONFIG.upgrades.slice()).slice(0,3);
    UI.openModal('<h3>升級選擇</h3>',choices.map(opt=>({label:opt.label,onClick:()=>{ opt.effect(state.hero); state.upgradesTaken.push(opt.id); UI.updateHero(state.hero,{}); save(); }})));
  }
  function advanceIfNeeded(){
    const area = DATA.areas[state.areaIndex];
    if(state.nodeIndex===area.nodes.length-1){
      if(state.areaIndex < DATA.areas.length-1){
        state.areaIndex+=1;
        state.nodeIndex=0;
        UI.toast(`抵達 ${DATA.areas[state.areaIndex].name}`);
      }
      UI.updateProgress(state.areaIndex,state.nodeIndex);
    }
  }
  function isGameClear(){
    return state.areaIndex===DATA.areas.length-1 && state.nodeIndex===DATA.areas[state.areaIndex].nodes.length-1 && !state.currentEnemy;
  }
  function showEnding(){
    const elapsed = Math.round((Date.now()-state.clearStats.start)/1000);
    const summary = `<h3>和聲復歸</h3><p>總時間：${elapsed}s<br>擊敗數：${state.clearStats.wins}<br>最高連勝：${state.clearStats.wins}<br>過音反噬次數：${state.clearStats.selfRecoil}</p>`;
    UI.openModal(summary,[{label:'重新開始',onClick:()=>restart()}]);
  }
  function onBattleLose(){
    state.scene='defeat';
    state.currentEnemy=null;
    UI.updateActions();
    UI.openModal('<h3>旅程暫告段落</h3><p>是否重新開始？</p>',[
      {label:'重新開始',onClick:()=>restart()},
      {label:'回到地圖',onClick:()=>{ state.scene='map'; state.hero.hp=Math.max(1,Math.round(state.hero.hpMax*0.4)); state.hero.en=Math.max(0,Math.round(state.hero.enMax*0.5)); UI.updateHero(state.hero,{}); save(); }}
    ]);
  }
  function useItem(index,fromModal){
    if(state.scene!=='battle') return;
    const battle = BattleSystem.getBattle();
    if(!battle) return;
    const item = state.inventory[index];
    if(!item) return;
    const hero = battle.hero;
    if(item.id==='共鳴石'){ battle.heroBuff.stone=true; UI.toast('共鳴石注入，下次普攻附加真傷。'); }
    if(item.id==='節拍器'){ hero.effects.acc=(hero.effects.acc||0)+15; if(hero.status['失調']) delete hero.status['失調']; UI.toast('節拍穩定，命中提升。'); }
    if(item.id==='靜音鈴'){ delete hero.status['殘響灼']; UI.toast('靜音鈴響，灼燒解除。'); }
    if(item.id==='清音露'){ delete hero.status['遲拍']; hero.en=Math.min(hero.enMax,hero.en+12); UI.toast('清音露恢復能量。'); }
    Inventory.remove(state.inventory,index);
    UI.updateInventory(state.inventory);
    UI.updateHero(hero,battle.heroBuff);
    UI.updateActions();
    if(fromModal) UI.closeModal();
    save();
  }
  function restart(){
    localStorage.removeItem(CONFIG.saveKey);
    window.location.reload();
  }
  function update(){
    SceneMap.render(state);
  }
  function input(action){
    if(state.scene==='init' && selectedHero && action==='confirm'){ confirmHero.click(); return; }
    if(state.scene==='map'){
      if(action==='right') move(1);
      if(action==='left') move(-1);
      if(action==='confirm'){
        handleNode(DATA.areas[state.areaIndex].nodes[state.nodeIndex]);
        save();
      }
    }
  }
  function battleAction(index){
    const map=['attack','tune','shield','harmony','ultimate','item'];
    BattleSystem.doHeroAction(map[index]);
    save();
  }
  return {state,update,input,battleAction,useItem,onBattleWin,onBattleLose,move,startNewGame,save,load,restart};
})();
const Controls = (()=>{
  const mapping = {
    'Digit1':0,'Digit2':1,'Digit3':2,'Digit4':3,'Digit5':4,'Digit6':5,
    'Key1':0,'Key2':1,'Key3':2,'Key4':3,'Key5':4,'Key6':5,
    'Space':'confirm','Enter':'confirm',
    'KeyW':'up','ArrowUp':'up',
    'KeyS':'down','ArrowDown':'down',
    'KeyA':'left','ArrowLeft':'left',
    'KeyD':'right','ArrowRight':'right'
  };
  window.addEventListener('keydown',e=>{
    const map = mapping[e.code] ?? mapping[e.key];
    if(map===undefined) return;
    e.preventDefault();
    if(typeof map==='number') Game.battleAction(map);
    else if(map==='confirm') Game.input('confirm');
    else if(map==='left') Game.move(-1);
    else if(map==='right') Game.move(1);
  });
  document.querySelectorAll('#virtual-pad [data-key]').forEach(btn=>{
    const handle=()=>{
      const key=btn.dataset.key;
      if(key==='Space') Game.input('confirm');
      if(key==='ArrowLeft') Game.move(-1);
      if(key==='ArrowRight') Game.move(1);
      if(key==='ArrowUp') Game.move(-1);
      if(key==='ArrowDown') Game.move(1);
    };
    btn.addEventListener('touchstart',e=>{e.preventDefault();handle();});
    btn.addEventListener('click',handle);
  });
})();
const UIActions = (()=>{
  document.getElementById('soundToggle').addEventListener('click',function(){
    const turnOn = this.textContent.includes('關');
    AudioFX.toggle(turnOn);
    this.textContent='音效：'+(turnOn?'開':'關');
  });
  document.getElementById('motionToggle').addEventListener('click',function(){
    const reduced = document.body.classList.toggle('reduce-motion');
    this.textContent='動效：'+(reduced?'關':'開');
  });
  document.getElementById('restartBtn').addEventListener('click',()=>Game.restart());
  document.getElementById('downloadSave').addEventListener('click',()=>{
    const data = localStorage.getItem(CONFIG.saveKey);
    if(!data){ UI.toast('沒有存檔'); return; }
    const blob = new Blob([data],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='harmony_save.json';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },0);
  });
  document.getElementById('uploadSave').addEventListener('change',e=>{
    const file = e.target.files?.[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload=evt=>{
      try{
        localStorage.setItem(CONFIG.saveKey,evt.target.result);
        UI.toast('存檔已載入，重新整理中');
        setTimeout(()=>window.location.reload(),600);
      }catch(err){
        console.error(err);
        UI.toast('存檔解析失敗');
      }
    };
    reader.readAsText(file);
  });
  ['action1','action2','action3','action4','action5','action6'].forEach((id,idx)=>{
    const btn=document.getElementById(id);
    btn.addEventListener('click',()=>Game.battleAction(idx));
  });
  document.querySelectorAll('.actions button').forEach(btn=>btn.disabled=true);
})();
function gameLoop(){
  Game.update();
  requestAnimationFrame(gameLoop);
}
if(!Game.load()){
  RNG.setSeed(Date.now());
}
UI.updateInventory(Game.state.inventory);
UI.updateHero(Game.state.hero,{});
requestAnimationFrame(gameLoop);
})();
</script>
