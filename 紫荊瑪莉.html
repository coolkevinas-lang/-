<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>紫荊瑪莉 - 紫荊花王國冒險</title>
<style>
:root {
    color-scheme: light dark;
}
body {
    margin: 0;
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: radial-gradient(circle at top, #24103a, #0c0215 60%, #040007);
    color: #f6f0ff;
    overflow: hidden;
}
#game-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
}
canvas {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
}
#hud {
    position: absolute;
    top: 1rem;
    left: 1rem;
    right: 1rem;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 1rem;
    background: rgba(24, 8, 40, 0.55);
    border-radius: 18px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.45);
    backdrop-filter: blur(9px);
}
#hud h1 {
    margin: 0;
    font-size: clamp(1.25rem, 1.8vw, 1.8rem);
    letter-spacing: 0.08em;
    text-shadow: 0 0 12px rgba(215, 170, 255, 0.75);
}
#hud .stat {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    font-size: clamp(0.9rem, 1.4vw, 1.2rem);
}
#hud .badge {
    padding: 0.3rem 0.75rem;
    border-radius: 999px;
    background: linear-gradient(120deg, rgba(120, 70, 200, 0.85), rgba(250, 210, 255, 0.65));
    color: #fff;
    font-weight: 600;
    box-shadow: inset 0 0 8px rgba(255,255,255,0.4);
}
#hud button {
    background: linear-gradient(140deg, #f6c8ff, #bb7cff);
    border: none;
    border-radius: 999px;
    padding: 0.5rem 1.4rem;
    font-size: 1rem;
    color: #2d0d40;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(0,0,0,0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
#hud button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}
#hud button:active {
    transform: translateY(1px) scale(0.98);
}
#tutorial {
    position: absolute;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30, 10, 50, 0.65);
    padding: 0.75rem 1.2rem;
    border-radius: 16px;
    font-size: clamp(0.9rem, 2.4vw, 1.1rem);
    color: #f1e9ff;
    box-shadow: 0 12px 24px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    max-width: min(90vw, 640px);
    text-align: center;
}
#touch-controls {
    position: absolute;
    bottom: 1.25rem;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 1.4rem;
    pointer-events: none;
}
.touch-group {
    display: flex;
    gap: 1.1rem;
}
.touch-btn {
    width: clamp(56px, 17vw, 86px);
    height: clamp(56px, 17vw, 86px);
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(200,140,255,0.7));
    box-shadow: 0 18px 30px rgba(0,0,0,0.35);
    display: grid;
    place-items: center;
    color: #2d0d40;
    font-size: clamp(1.4rem, 6vw, 2.4rem);
    font-weight: 700;
    opacity: 0.88;
    pointer-events: auto;
    user-select: none;
    touch-action: none;
    transition: transform 0.1s ease, opacity 0.2s ease;
}
.touch-btn:active {
    transform: scale(0.92);
    opacity: 1;
}
@media (max-width: 720px) {
    #hud {
        top: 0.6rem;
        left: 0.6rem;
        right: 0.6rem;
        padding: 0.6rem 0.75rem;
    }
    #tutorial {
        bottom: 7.5rem;
    }
}
</style>
</head>
<body>
<div id="game-wrapper">
    <canvas id="gameCanvas" width="1280" height="720" role="img" aria-label="紫荊瑪莉冒險的遊戲畫面"></canvas>
    <div id="hud">
        <h1>紫荊瑪莉：紫荊花王國冒險</h1>
        <div class="stat"><span>關卡：</span><span class="badge" id="levelDisplay">1</span></div>
        <div class="stat"><span>得分：</span><span class="badge" id="scoreDisplay">0</span></div>
        <div class="stat"><span>生命：</span><span class="badge" id="lifeDisplay">3</span></div>
        <button id="startButton">開始 / 暫停</button>
    </div>
    <div id="tutorial">按 ← → 或觸控圓形按鈕行走，按 A / B 或跳躍鍵跳躍與衝刺。收集紫荊花花瓣提升能量，擊敗大魔王「科科」守護紫荊花王國！</div>
    <div id="touch-controls">
        <div class="touch-group">
            <div class="touch-btn" data-action="left">◀</div>
            <div class="touch-btn" data-action="right">▶</div>
        </div>
        <div class="touch-group">
            <div class="touch-btn" data-action="jump">A</div>
            <div class="touch-btn" data-action="dash">B</div>
        </div>
    </div>
</div>

    clamp(value, min, max) {

    lerp(a, b, t) {

    ease(t) {

class SpriteSheet {
    constructor(image, framesAcross, framesDown) {
        this.image = new Image();
        this.image.src = image;
        this.loaded = false;
        this.image.onload = () => {
            this.loaded = true;
            this.frameWidth = this.image.width / framesAcross;
            this.frameHeight = this.image.height / framesDown;
        };
        this.framesAcross = framesAcross;
        this.framesDown = framesDown;
    }
    draw(ctx, frame, x, y, w, h) {
        if (!this.loaded) return;
        const fx = frame % this.framesAcross;
        const fy = Math.floor(frame / this.framesAcross);
        ctx.drawImage(
            this.image,
            fx * this.frameWidth,
            fy * this.frameHeight,
            this.frameWidth,
            this.frameHeight,
            x,
            y,
            w,
            h
        );
    }
}
class InputController {
    constructor() {
        this.keys = new Map();
        this.listeners = new Map();
        this.touchMap = new Map();
        window.addEventListener("keydown", e => this.handleKey(e, true));
        window.addEventListener("keyup", e => this.handleKey(e, false));
        document.querySelectorAll(".touch-btn").forEach(btn => {
            const action = btn.dataset.action;
            const start = () => {
                this.touchMap.set(action, true);
            };
            const end = () => {
                this.touchMap.set(action, false);
            };
            ["touchstart", "mousedown"].forEach(evt => btn.addEventListener(evt, e => { e.preventDefault(); start(); }));
            ["touchend", "touchcancel", "mouseup", "mouseleave"].forEach(evt => btn.addEventListener(evt, e => { e.preventDefault(); end(); }));
        });
    }
    handleKey(event, pressed) {
        const key = event.key.toLowerCase();
        if (["arrowleft", "arrowright", "a", "d", "w", "arrowup", " ", "shift", "k", "j"].includes(key)) {
            event.preventDefault();
        }
        this.keys.set(key, pressed);
    }
    isPressed(action) {
        switch(action) {
            case "left":
                return this.keys.get("arrowleft") || this.keys.get("a") || this.touchMap.get("left");
            case "right":
                return this.keys.get("arrowright") || this.keys.get("d") || this.touchMap.get("right");
            case "jump":
                return this.keys.get("w") || this.keys.get("arrowup") || this.keys.get(" ") || this.touchMap.get("jump");
            case "dash":
                return this.keys.get("shift") || this.keys.get("k") || this.keys.get("j") || this.touchMap.get("dash");
            default:
                return false;
        }
    }
}
class Particle {
    constructor(x, y, options = {}) {
        this.x = x;
        this.y = y;
        this.z = options.z ?? 0;
        this.vx = options.vx ?? 0;
        this.vy = options.vy ?? 0;
        this.vz = options.vz ?? 0;
        this.life = options.life ?? 1;
        this.maxLife = this.life;
        this.size = options.size ?? 6;
        this.color = options.color ?? "rgba(255,255,255,0.9)";
        this.gravity = options.gravity ?? 0.0;
        this.fade = options.fade ?? 0.92;
        this.rotation = options.rotation ?? 0;
        this.spin = options.spin ?? 0;
    }
    update(dt) {
        this.life -= dt;
        this.vy += this.gravity * dt * 60;
        this.x += this.vx * dt * 60;
        this.y += this.vy * dt * 60;
        this.z += this.vz * dt * 60;
        this.rotation += this.spin * dt * 60;
        this.size *= this.fade;
    }
    render(ctx, camera) {
        if (this.life <= 0) return;
        const scale = utility.perspectiveScale(this.z);
        const screenX = (this.x - camera.x) * camera.zoom;
        const screenY = (this.y - camera.y) * camera.zoom;
        const size = this.size * scale * camera.zoom;
        ctx.save();
        ctx.translate(screenX, screenY);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = utility.clamp(this.life / this.maxLife, 0, 1);
        ctx.beginPath();
        ctx.arc(0, 0, size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}
class Entity {
    constructor(x, y, w, h) {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
        this.vx = 0;
        this.vy = 0;
        this.onGround = false;
        this.facing = 1;
        this.health = 1;
        this.maxHealth = 1;
        this.active = true;
    }
    get rect() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
    }
    intersects(other) {
        return !(
            this.x + this.w < other.x ||
            this.x > other.x + other.w ||
            this.y + this.h < other.y ||
            this.y > other.y + other.h
        );
    }
}
class Platform extends Entity {
    constructor(x, y, w, h, options = {}) {
        super(x, y, w, h);
        this.color = options.color || "#61439c";
        this.sheen = options.sheen || "rgba(255,255,255,0.3)";
        this.float = options.float || 0;
        this.phase = options.phase || Math.random() * Math.PI * 2;
    }
    update(dt) {
        if (this.float !== 0) {
            this.y += Math.sin(gameTime * 0.002 + this.phase) * this.float * dt * 60;
        }
    }
    render(ctx, camera) {
        const x = (this.x - camera.x) * camera.zoom;
        const y = (this.y - camera.y) * camera.zoom;
        ctx.save();
        ctx.fillStyle = this.color;
        ctx.fillRect(x, y, this.w * camera.zoom, this.h * camera.zoom);
        ctx.fillStyle = this.sheen;
        ctx.fillRect(x, y, this.w * camera.zoom, Math.max(4, this.h * 0.25) * camera.zoom);
        ctx.restore();
    }
}
class Collectible extends Entity {
    constructor(x, y, type = "petal") {
        super(x, y, 32, 32);
        this.type = type;
        this.amplitude = 12 + Math.random() * 8;
        this.baseY = y;
        this.value = type === "petal" ? 150 : 400;
        this.hue = type === "petal" ? utility.randomRange(260, 320) : utility.randomRange(180, 220);
    }
    update(dt) {
        this.y = this.baseY + Math.sin(gameTime * 0.004 + this.x * 0.01) * this.amplitude;
    }

        const x = (this.x - camera.x) * camera.zoom;

        const gradient = ctx.createRadialGradient(x + 16, y + 16, 4, x + 16, y + 16, 20);
        gradient.addColorStop(0, `hsla(${this.hue}, 90%, 70%, 0.95)`);
        gradient.addColorStop(0.5, `hsla(${this.hue}, 80%, 60%, 0.55)`);
        gradient.addColorStop(1, "rgba(255,255,255,0)");
        ctx.save();
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.ellipse(x + 16, y + 16, 18 * camera.zoom, 12 * camera.zoom, Math.sin(gameTime * 0.006 + this.x * 0.02), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}
class Enemy extends Entity {

        ctx.lineWidth = 4;
        ctx.beginPath();

const gradientBands = [
    {y: 0, h: 220, start: "rgba(80,40,120,0.6)", end: "rgba(20,10,50,0.05)", parallax: 0.08},
    {y: 160, h: 180, start: "rgba(100,65,150,0.6)", end: "rgba(40,35,80,0.05)", parallax: 0.13},

];
const input = new InputController();
const particles = [];
const levelSegments = levelBlueprint.map(config => new LevelSegment(config));
const level = new Level(levelSegments);

function renderGradientBackground(ctx, camera) {
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height / DPR);
    gradient.addColorStop(0, "#3e1d6a");
    gradient.addColorStop(0.4, "#452168");
    gradient.addColorStop(1, "#0f041c");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width / DPR, canvas.height / DPR);
    for (const band of gradientBands) {
        const y = (band.y - camera.y * band.parallax) * camera.zoom;
        const h = band.h * camera.zoom;
        const bandGradient = ctx.createLinearGradient(0, y, 0, y + h);
        bandGradient.addColorStop(0, band.start);
        bandGradient.addColorStop(1, band.end);
        ctx.fillStyle = bandGradient;
        ctx.fillRect(0, y, canvas.width / DPR, h);
    }
}
function renderSkyOrbs(ctx, camera) {
    for (const orb of skyOrbs) {
        const scale = utility.perspectiveScale(orb.z);
        const x = ((orb.x - camera.x * orb.parallax) % world.width) * camera.zoom;
        const y = (orb.y - camera.y * orb.parallax) * camera.zoom;
        const radius = orb.r * scale * camera.zoom;
        ctx.save();
        ctx.globalAlpha = orb.alpha;
        const radial = ctx.createRadialGradient(x, y, radius * 0.2, x, y, radius);
        radial.addColorStop(0, orb.inner);
        radial.addColorStop(1, orb.outer);
        ctx.fillStyle = radial;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}
function renderFloatingPetals(ctx, camera) {
    for (const petal of floatingPetals) {
        const x = ((petal.x - camera.x * petal.parallax + gameTime * petal.driftX) % (world.width * petal.wrap)) * camera.zoom;
        const y = (petal.y + Math.sin(gameTime * petal.frequency + petal.offset) * petal.amplitude - camera.y * petal.parallax) * camera.zoom;
        const width = petal.w * camera.zoom;
        const height = petal.h * camera.zoom;
        ctx.save();
        ctx.globalAlpha = petal.alpha;
        ctx.translate(x, y);
        ctx.rotate(Math.sin(gameTime * 0.001 + petal.offset) * petal.rotation);
        const gradient = ctx.createLinearGradient(-width / 2, -height / 2, width / 2, height / 2);
        gradient.addColorStop(0, petal.start);
        gradient.addColorStop(1, petal.end);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(0, -height / 2);
        ctx.quadraticCurveTo(width / 2, 0, 0, height / 2);
        ctx.quadraticCurveTo(-width / 2, 0, 0, -height / 2);
        ctx.fill();
        ctx.restore();
    }
}
function updateCamera(target, dt) {
    const desiredX = utility.clamp(target.x - camera.width * 0.4, 0, world.width - camera.width);
    const desiredY = utility.clamp(target.y - camera.height * 0.6, 0, world.height - camera.height);
    camera.x = utility.lerp(camera.x, desiredX, 0.08);
    camera.y = utility.lerp(camera.y, desiredY, 0.08);
    const speed = Math.sqrt(target.vx * target.vx + target.vy * target.vy);
    camera.targetZoom = utility.clamp(1 + speed * 0.01, 1, 1.18);
    camera.zoom = utility.lerp(camera.zoom, camera.targetZoom, 0.05);
}
function update(dt) {
    gameTime += dt * 1000;
    const segment = level.currentSegment;
    for (const platform of segment.platforms) {
        platform.update(dt);
    }
    player.update(dt, input, segment.platforms, particles);
    for (const collectible of segment.collectibles) {
        collectible.update(dt);
        if (collectible.active && player.intersects(collectible)) {
            collectible.active = false;
            player.score += collectible.value;
            hudScore.textContent = player.score;
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(
                    collectible.x + 16,
                    collectible.y + 16,
                    {
                        vx: (Math.random() - 0.5) * 5,
                        vy: (Math.random() - 0.5) * 5,
                        size: 10,
                        color: `hsla(${collectible.hue}, 95%, 72%, 0.9)`,
                        life: 1.1,
                        gravity: -0.02
                    }
                ));
            }
        }
    }
    for (const enemy of segment.enemies) {
        enemy.update(dt);
        if (player.invulnerable <= 0 && player.intersects(enemy)) {
            player.lives -= enemy.damage;
            hudLife.textContent = Math.max(player.lives, 0);
            player.invulnerable = 2.5;
            player.vx = -enemy.facing * 12;
            player.vy = -12;
        }
    }
    if (segment.boss && segment.boss.active) {
        segment.boss.update(dt, player, particles);
        if (player.invulnerable <= 0 && player.intersects(segment.boss)) {
            player.lives -= 1;
            hudLife.textContent = Math.max(player.lives, 0);
            player.invulnerable = 2.5;
            player.vx = -player.facing * 15;
            player.vy = -15;
        }
    }
    for (let i = particles.length - 1; i >= 0; i--) {
        const particle = particles[i];
        particle.update(dt);
        if (particle.life <= 0 || particle.size < 0.4) {
            particles.splice(i, 1);
        }
    }
    if (player.lives <= 0) {
        resetGame();
        return;
    }
    if (player.x + player.w > segment.exitX) {
        level.advance();
        const nextSegment = level.currentSegment;
        player.reset(nextSegment.entryX, nextSegment.entryY);
    }
    updateCamera(player, dt);
}
function render() {
    renderGradientBackground(ctx, camera);
    renderSkyOrbs(ctx, camera);
    renderFloatingPetals(ctx, camera);
    const segment = level.currentSegment;
    for (const deco of segment.decor) {
        const x = ((deco.x - camera.x * deco.parallax) % world.width) * camera.zoom;
        const y = (deco.y - camera.y * deco.parallax) * camera.zoom;
        const scale = utility.perspectiveScale(deco.z) * camera.zoom;
        ctx.save();
        ctx.globalAlpha = deco.alpha;
        ctx.fillStyle = deco.fill;
        ctx.beginPath();
        ctx.ellipse(x, y, deco.rx * scale, deco.ry * scale, deco.rotation, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    for (const platform of segment.platforms) {
        platform.render(ctx, camera);
    }
    for (const collectible of segment.collectibles) {
        if (collectible.active) {
            collectible.render(ctx, camera);
        }
    }
    for (const enemy of segment.enemies) {
        enemy.render(ctx, camera);
    }
    if (segment.boss && segment.boss.active) {
        segment.boss.render(ctx, camera);
    }
    player.render(ctx, camera);
    for (const particle of particles) {
        particle.render(ctx, camera);
    }
    if (segment.boss && segment.boss.active) {
        const width = canvas.width / DPR;
        const barWidth = width * 0.4;
        const x = width * 0.3;
        const y = 36;
        const ratio = segment.boss.health / segment.boss.maxHealth;
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.fillRect(x, y, barWidth, 18);
        const gradient = ctx.createLinearGradient(x, y, x + barWidth, y);
        gradient.addColorStop(0, "#ff6a9a");
        gradient.addColorStop(1, "#ffa5d3");
        ctx.fillStyle = gradient;
        ctx.fillRect(x, y, barWidth * ratio, 18);
        ctx.strokeStyle = "rgba(255,255,255,0.7)";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, barWidth, 18);
        ctx.fillStyle = "#ffe7f7";
        ctx.font = "bold 16px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("大魔王：科科", x + barWidth / 2, y - 6);
        ctx.restore();
    }
}
function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 1 / 30);
    lastTime = now;
    if (!paused) {
        update(dt);
        render();
    }
    frameId = requestAnimationFrame(loop);
}
function resetGame() {
    level.currentIndex = 0;
    const firstSegment = level.currentSegment;
    player.score = 0;
    player.lives = 3;
    hudScore.textContent = player.score;
    hudLife.textContent = player.lives;
    player.reset(firstSegment.entryX, firstSegment.entryY);
    for (const segment of level.segments) {
        segment.collectibles.forEach(col => col.active = true);
        if (segment.boss) {
            segment.boss.health = segment.boss.maxHealth;
            segment.boss.active = true;
        }
    }
}
startButton.addEventListener("click", () => {
    paused = !paused;
    if (!paused) {
        tutorial.style.display = "none";
    }
});
canvas.addEventListener("click", () => {
    if (paused) {
        paused = false;
        tutorial.style.display = "none";
    }
});
resetGame();
render();
loop(lastTime);
})();
</script>
</body>
</html>
