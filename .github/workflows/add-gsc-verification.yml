name: Add Google Search Console Verification

on:
  push:
    branches: [main]
    paths:
      - "coco-select/tools/add_gsc_verification.py"
      - ".github/workflows/add-gsc-verification.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Patch homepage verification meta
        run: python coco-select/tools/add_gsc_verification.py

      - name: Commit homepage verification
        shell: bash
        run: |
          if git diff --quiet -- coco-select/index.html; then
            echo "Verification tag already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coco-select/index.html
          git commit -m "feat(search-console): publish Google verification tag [skip ci]"
          git push
