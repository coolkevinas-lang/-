name: Restore CO CO SELECT page

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/restore-coco-select.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download full embedded HTML
        run: |
          set -euo pipefail
          mkdir -p coco-select
          curl -L --fail --silent --show-error "https://litter.catbox.moe/1zu8ji.html" -o coco-select/index.html
          echo "84d2311bc27bf05ae7177e3fc35e1109d40f0b20d762b050f1d3c1c00fd9190a  coco-select/index.html" | sha256sum -c -
          test "$(grep -o 'data:image/' coco-select/index.html | wc -l)" -gt 0
          rm -f .github/workflows/restore-coco-select.yml

      - name: Commit restored page
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coco-select/index.html .github/workflows/restore-coco-select.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "restore full CO CO SELECT page with embedded images"
            git push
          fi
