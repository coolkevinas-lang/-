<!doctype html>
<meta charset="utf-8">
<title>CO CO SELECT item exporter</title>
<pre id="out">loading...</pre>
<script>
(async()=>{
  const html=await fetch('../index.html',{cache:'no-store'}).then(r=>r.text());
  const m=html.match(/const items = (\[[\s\S]*?\n\]);\s*\n\s*const selectors/);
  if(!m) throw new Error('items array not found');
  const items=JSON.parse(m[1]);
  const clean=items.map(({image,...x})=>x);
  document.getElementById('out').textContent=JSON.stringify(clean,null,2);
})().catch(e=>document.getElementById('out').textContent='ERROR: '+e.stack);
</script>
